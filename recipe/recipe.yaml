schema_version: 1

context:
  version: "1.4.7"

package:
  name: perceval
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/perceval/perceval-${{ version }}.tar.gz
  sha256: 466a14e329d7490afd9357a3ee63dd17dfb6c71d54abee7469725e21d0485a3e

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - perceval = perceval.perceval:main

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core
    - pip
  run:
    - python >=${{ python_min }}
    - python-dateutil >=2.6.0,<3.0.0
    - requests >=2.7.0,<3.0.0
    - beautifulsoup4 >=4.3.2,<5.0.0
    - feedparser >=6.0.8,<7.0.0
    - dulwich >=0.21.5,<0.23.0
    - urllib3 >=2.2.0,<3.0.0
    - pyjwt >=2.4.0,<3.0.0
    - grimoirelab-toolkit >=0.3
    - git

tests:
  - python:
      python_version:
        - ${{ python_min }}.*
        - "*"
      imports:
        - perceval
      pip_check: true
  - requirements:
      run:
        - pip
        - python
    script:
      - perceval --help

about:
  summary: Send Sir Perceval on a quest to fetch and gather data from software repositories.
  license: GPL-3.0-only
  license_file: LICENSE
  homepage: https://chaoss.github.io/grimoirelab/

extra:
  recipe-maintainers:
    - travishathaway
